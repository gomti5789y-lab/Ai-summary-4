<!DOCTYPE html>
<html>
<head>
    <title>AI Tool</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5 bg-light">
    <div class="container bg-white p-4 shadow rounded">
        <h3>Upload Document (Image/PDF)</h3>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" class="form-control mb-3">
            <button type="submit" class="btn btn-primary w-100">Extract Text</button>
        </form>

        <hr>
        <label>You can edit text here:</label>
        <textarea id="output" class="form-control mb-3" rows="8">{{ text }}</textarea>
        
        <div class="d-flex gap-2">
            <button onclick="speakText()" class="btn btn-success">Listen Voice</button>
            <button onclick="summarizeAI()" class="btn btn-warning">Get AI Summary</button>
        </div>

        <div id="summaryBox" class="mt-4 p-3 border rounded bg-light d-none">
            <strong>Summary:</strong>
            <p id="summaryText"></p>
        </div>
    </div>

    <script>
        function speakText() {
            let txt = document.getElementById('output').value;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
        }

        async function summarizeAI() {
            let txt = document.getElementById('output').value;
            let response = await fetch('/summarize', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: txt})
            });
            let data = await response.json();
            document.getElementById('summaryBox').classList.remove('d-none');
            document.getElementById('summaryText').innerText = data.summary;
        }
    </script>
</body>
</html>
